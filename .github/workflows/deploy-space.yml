name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deploy dependency
        run: python -m pip install --upgrade huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: Gosula16/Reels
          HF_REPO_TYPE: space
          HF_SPACE_SDK: docker
        run: python scripts/deploy_to_huggingface.py
